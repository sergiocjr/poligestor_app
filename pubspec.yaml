name: poligestor_app
description: Aplicativo mobile PoliGestor — operação em campo (staff) e portal do cidadão.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  go_router: ^15.1.2
  provider: ^6.1.5
  intl: ^0.20.2
  image_picker: ^1.2.3
  geolocator: ^14.0.2
  path: ^1.9.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
