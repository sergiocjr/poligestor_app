name: poligestor_app
description: Aplicativo mobile PoliGestor — operação em campo (staff) e portal do cidadão.
publish_to: "none"
version: 1.0.0+6

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  go_router: ^15.1.2
  provider: ^6.1.5
  intl: ^0.20.2
  image_picker: ^1.2.3
  geolocator: ^14.0.2
  path: ^1.9.1
  url_launcher: ^6.3.2
  web_socket_channel: ^3.0.3
  app_links: ^7.2.1
  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - logo/poligestor_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: logo/poligestor_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: logo/poligestor_icon.png
  remove_alpha_ios: true
